<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fearless Dictionary</title>
<style>
  body {
    background-color: #121212;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    color: #0ab4ff;
    margin-bottom: 20px;
  }
  input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
  }
  input {
    width: 80%;
    max-width: 300px;
  }
  button {
    background-color: #0ab4ff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }
  #result {
    margin-top: 20px;
    font-size: 18px;
    max-width: 90%;
    text-align: center;
  }
  footer {
    position: fixed;
    bottom: 10px;
    font-size: 14px;
    color: #777;
  }
</style>
</head>
<body>
  <h1>Fearless Dictionary</h1>
  <input type="text" id="wordInput" placeholder="Type a word...">
  <button onclick="searchWord()">Search</button>
  <div id="result"></div>
  <footer>Made by Fearless</footer>

<script>
async function searchWord() {
  const word = document.getElementById('wordInput').value;
  if (!word) return alert('Please type a word!');
  try {
    const res = await fetch(`http://localhost:3000/search?word=${word}`);
    const data = await res.json();
    document.getElementById('result').innerText = data.definition;
  } catch (err) {
    document.getElementById('result').innerText = 'Error connecting to server.';
  }
}
</script>
</body>
</html>
